<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KICK BANK | Piggy</title>
    <style>
        /* 1. 引入你的 Kick 风格全局设置 */
        @font-face {
            font-family: "kick";
            src: url(fonts/kick-font.ttf);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            scroll-behavior: smooth;
            letter-spacing: 1px;
        }

        body {
            background-color: #2a2a2a; /* 你的背景色 */
            color: white;
            font-family: "kick", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* 2. 借用你的渐变背景动画 */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(77deg, #1a3d1a 0%, #284e28 20%, #1f1f1f 45%, #1f2e1f 60%, #2d7a2d 78%, #047b04 100%);
            background-size: 250% 250%;
            animation: gradientMove 6s ease infinite alternate;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 50% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* 3. 银行主卡片 - 改造成你的 .about-card 风格 */
        .container-body {
            background-color: #1f1f1f; /* 你的 nav/about 颜色 */
            padding: 40px;
            border-radius: 15px;
            border-left: 8px solid #00e700; /* 你的招牌绿边 */
            border-right: 8px solid #00e700;
            width: 500px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 30px rgba(0, 231, 0, 0.2);
            transition: all 0.3s ease;
        }

        .container-body:hover {
            box-shadow: 1px 1px 20px 16px rgba(0, 231, 1, 0.3);
            transform: translateY(-5px);
        }

        h1 {
            font-size: 3rem;
            color: #00e700;
            text-align: center;
            letter-spacing: 5px;
        }

        /* 4. 余额盒子 - 借鉴你的 .how-grid 风格 */
        .amount-body {
            background-color: #2a2a2a;
            border: 2px solid #3a3a3a;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
        }

        .amount-body p {
            font-family: sans-serif; /* 遵循你 p 标签用 sans-serif 的规则 */
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .amount-body h4 {
            font-size: 2.8rem;
            color: #00e700; /* 改成你的绿色 */
            text-shadow: 0 0 10px rgba(0, 231, 0, 0.5);
        }

        /* 5. 收款人/输入框标签 */
        h5 {
            color: #00e700;
            font-size: 1.2rem;
            margin-bottom: -10px;
        }

        /* 6. 收款人背景 */
        .ys-bg {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .ys-bg img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #00e700;
            object-fit: cover;
        }

        .ys-info b { color: #fff; display: block; }
        .ys-info span { color: #00e700; font-size: 0.8rem; font-family: sans-serif; }

        /* 7. 输入框 - 借鉴你的 .input-group 风格 */
        input {
            width: 100%;
            padding: 15px;
            background-color: #111;
            border: 2px solid #6160609f;
            color: #00e700;
            border-radius: 5px;
            font-size: 1.2rem;
            font-family: "kick", sans-serif;
            outline: none;
            transition: all 0.2s linear;
        }

        input:focus {
            border: 2px solid #00e701;
            box-shadow: 0 0 15px rgba(0, 231, 1, 0.3);
        }

        /* 8. 按钮 - 完全套用你的 #home-btn 风格 */
        .btn-transfer {
            color: black;
            border: none;
            padding: 18px;
            background-color: #00e701;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            font-family: "kick", sans-serif;
            letter-spacing: 3px;
            transition: all 0.1s linear;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-transfer:hover {
            transform: translateY(-5px) scale(1.03);
            background-color: #00ff01;
            box-shadow: 1px 1px 20px 16px rgba(0, 162, 1, 0.4);
        }

        .btn-transfer:active {
            transform: translateY(0px) scale(0.95);
            background-color: #00c201;
        }

        /* 登录头像 (右上角) */
        .login {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: center;
        }

        .login img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #00e700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login">
            <img src="https://media-cldnry.s-nbcnews.com/image/upload/t_fit-560w,f_auto,q_auto:best/rockcms/2023-06/230601-jeffrey-epstein-2005-ac-547p-94aa33.jpg" alt="user" />
            <p style="font-size: 12px; color: #00e700;">ADMIN</p>
        </div>

        <div class="container-body">
            <h1>KICK BANK</h1>
            
            <div class="amount-body">
                <p>Vault Balance</p>
                <h4>BTC 69.00</h4>
            </div>

            <h5>RECEIVER</h5>
            <div class="ys-bg">
                <img src="assets/IMG_0144.jpg" alt="logo" onerror="this.src='https://ui-avatars.com/api/?name=YS&background=00e700&color=000'"/>
                <div class="ys-info">
                    <b>YS (LEGEND)</b>
                    <span>ID: 8888-KICK-9999</span>
                </div>
            </div>

            <h5>AMOUNT (BTC)</h5>
            <input type="number" id="amount" placeholder="0.00" step="0.01" />

            <button class="btn-transfer">SEND FUNDS</button>
        </div>
    </div>
</body>
</html>
