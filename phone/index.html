<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/fontawesome.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/sharp-solid.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/sharp-regular.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/sharp-light.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/duotone.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/solid.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/regular.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/light.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/brands.css" />

        <!-- Additional Fontawesome Pro+ Icons for v7.2.0 -->

        <!-- Sharp Duotone -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/sharp-duotone-solid.css" />
        <!-- Chisel -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/chisel-regular.css" />
        <!-- Etch -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/etch-solid.css" />
        <!-- Graphite -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/graphite-thin.css" />
        <!-- Jelly -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/jelly-regular.css" />
        <!-- Notdog -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/notdog-solid.css" />
        <!-- Slab -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/slab-regular.css" />
        <!-- Thumb Print -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/thumbprint-light.css" />
        <!-- Utility -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/utility-semibold.css" />
        <!-- Whiteboard -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rizmyabdulla/fontawesome-pro@main/releases/v7.2.0/css/whiteboard-semibold.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
        <title>Document</title>
    </head>
    <body>
        <div class="container">
            <div class="phone">
                <div class="top">
                    <div class="top-start">
                        <i class="fa-solid fa-wifi" style="color: greenyellow"></i>
                        <span>UMobile</span>
                    </div>
                    <div class="top-mid">
                        <span>4:00 PM</span>
                    </div>
                    <div class="top-end">
                        <i class="fa-solid fa-lock"></i>
                        <i class="fa-solid fa-battery-full"></i>
                    </div>
                </div>
                <div class="content">
                    <div class="apps">
                        <img src="assets/App-Store.png" alt="app" class="app" />
                        <span>Apps Store</span>
                    </div>
                    <div class="apps">
                        <img src="assets/PayPal.png" alt="app" class="app" />
                        <span>Cash App</span>
                    </div>
                    <div class="apps">
                        <img src="assets/Facebook.png" alt="app" class="app" />
                        <span>GoonBook</span>
                    </div>
                    <div class="apps">
                        <img src="assets/Instagram.png" alt="app" class="app" />
                        <span>Instagoon</span>
                    </div>
                    <div class="apps">
                        <img src="assets/Calendar.png" alt="app" class="app" />
                        <span>Calender</span>
                    </div>
                    <div class="apps">
                        <img src="assets/Mail.png" alt="app" class="app" />
                        <span>Mail</span>
                    </div>
                    <div class="apps">
                        <img src="assets/Clock.png" alt="app" class="app" />
                        <span>Clock</span>
                    </div>
                    <div class="apps">
                        <img src="assets/Wallet.png" alt="app" class="app" />
                        <span>Wallet</span>
                    </div>
                    <div class="apps">
                        <img src="assets/News.png" alt="app" class="app" />
                        <span>News</span>
                    </div>
                    <div class="apps">
                        <img src="assets/Netflix.png" alt="app" class="app" />
                        <span>NutFlix</span>
                    </div>
                    <div class="apps">
                        <img src="assets/Snapchat.png" alt="app" class="app" />
                        <span>GoonChat</span>
                    </div>
                </div>
                <div class="end">
                    <div class="end-app" id="app-setting">
                        <img src="assets/Settings.png" alt="app" class="app" />
                    </div>
                    <div class="end-app">
                        <img src="assets/Phone.png" alt="app" class="app" />
                    </div>
                    <div class="end-app">
                        <img src="assets/Contacts.png" alt="app" class="app" />
                    </div>
                </div>
                <div id="setting">
                    <div class="setting-nav">
                        <h2>Settings</h2>
                    </div>
                    <div class="setting-start">
                        <div class="setting-content">
                            <div class="left">
                                <div class="c-icon">
                                    <i class="fa-solid fa-calendar-image"></i>
                                </div>
                                <span>Wallpaper</span>
                            </div>
                            <div class="right" id="wallpapers">
                                <i class="fa-regular fa-angle-right" style="color: rgb(116, 192, 252)"></i>
                            </div>
                        </div>
                        <div class="setting-content">
                            <div class="left">
                                <div class="c-icon">
                                    <i class="fa-solid fa-circle-info"></i>
                                </div>
                                <span>About Phone</span>
                            </div>
                            <div class="right" id="about-right">
                                <i class="fa-regular fa-angle-right" style="color: rgb(116, 192, 252)"></i>
                            </div>
                        </div>
                        <div class="setting-content">
                            <div class="left">
                                <div class="c-icon">
                                    <i class="fa-solid fa-triangle-person-digging"></i>
                                </div>
                                <span>WIP</span>
                            </div>
                            <div class="right">
                                <i class="fa-regular fa-angle-right" style="color: rgb(116, 192, 252)"></i>
                            </div>
                        </div>
                    </div>
                    <div id="wallpaper">
                        <div class="setting-nav">
                            <h2>Wallpaper</h2>
                        </div>
                        <div class="wpp-grid">
                            <div class="wpp-url">
                                <input type="text" id="wpp-input" placeholder="Enter image URL..." />
                                <button id="wpp-btn">Set</button>
                                <button id="wpp-reset">Reset</button>
                            </div>
                            <div class="wpp-card">
                                <img src="assets/bg/beach.jpg" alt="wallpaper" />
                            </div>
                            <div class="wpp-card">
                                <img src="assets/bg/wp5884944-iphone-stock-hd-wallpapers.png" alt="wallpaper" />
                            </div>
                            <div class="wpp-card">
                                <img src="assets/bg/wp7832724-ios-5-wallpapers.jpg" alt="wallpaper" />
                            </div>
                            <div class="wpp-card">
                                <img src="https://wallpapercave.com/wp/wp4020523.jpg" alt="wallpaper" />
                            </div>
                            <div class="wpp-card">
                                <img src="assets/bg/wp4020516-iphone-5s-wallpapers.png" alt="wallpaper" />
                            </div>
                            <div class="wpp-card">
                                <img src="https://wallpapercave.com/wp/wp9926039.png" alt="wallpaper" />
                            </div>
                        </div>
                    </div>
                    <div id="about">
                        <div class="setting-nav">
                            <h2>About</h2>
                        </div>
                        <div class="about-top">
                            <div class="top-info">
                                <img src="https://i.pinimg.com/736x/a2/80/e2/a280e2a50bf6240f29b49a72875adee5.jpg" alt="pfp" id="pfp" />
                                <p id="username">User</p>
                            </div>
                        </div>
                        <div class="setting-start">
                            <div class="setting-content">
                                <div class="left">
                                    <div class="c-icon">
                                        <i class="fa-solid fa-address-card"></i>
                                    </div>
                                    <span>Change Info</span>
                                </div>
                                <div class="right" id="edit-pfp">
                                    <i class="fa-regular fa-angle-right" style="color: rgb(116, 192, 252)"></i>
                                </div>
                            </div>
                        </div>
                        <div id="status">
                            <div class="setting-nav">
                                <h2>Change Info</h2>
                            </div>
                            <div class="about-top">
                                <div class="top-info">
                                    <img src="https://i.pinimg.com/736x/a2/80/e2/a280e2a50bf6240f29b49a72875adee5.jpg" alt="pfp" id="pfp-preview" />
                                    <p id="username-preview">User</p>
                                </div>
                            </div>
                            <div class="setting-start">
                                <div class="setting-content">
                                    <div class="left">
                                        <span>Name</span>
                                    </div>
                                    <div class="right">
                                        <input type="text" id="name-input" placeholder="Enter name..." />
                                    </div>
                                </div>
                                <div class="setting-content">
                                    <div class="left">
                                        <span>Photo</span>
                                    </div>
                                    <div class="right">
                                        <input type="file" id="pfp-upload" accept="image/*" style="display: none" />
                                        <button id="pfp-btn" onclick="document.querySelector('#pfp-upload').click()">Upload</button>
                                    </div>
                                </div>
                            </div>
                            <button id="save-btn">Save</button>
                        </div>
                    </div>
                    <div class="bottom" id="back"></div>
                </div>
            </div>
        </div>
        <script src="js.js"></script>
    </body>
</html>
